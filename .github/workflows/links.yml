name: Link check

# Weekly external-link check across the docs and root documents.
# mkdocs build --strict validates internal links on every PR; this covers
# what it can't -- external targets (screenshot raw URLs, the server site,
# CurseForge, shields.io) rotting over time. A red scheduled run is the
# signal; nothing auto-files issues.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # --accept 429: rate limits are not rot.
          # CurseForge sits behind Cloudflare and 403s bots -- excluded to
          # keep the weekly signal free of that known false positive.
          args: >-
            --no-progress
            --accept 200..206,429
            --exclude 'curseforge\.com'
            README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md
            'docs/**/*.md'
          fail: true
