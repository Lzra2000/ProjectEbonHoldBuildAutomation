name: Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sh scripts/dev-setup.sh

      - name: Run scripts/check.sh (syntax, test suite, .toc verification, 3.3.5a API check)
        run: sh scripts/check.sh

      - name: Verify dist/EbonBuilds.zip builds cleanly
        run: sh scripts/build-dist.sh
