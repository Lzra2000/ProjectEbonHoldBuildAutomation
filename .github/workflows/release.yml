name: Release

# Publishes the GitHub Release for a pushed v* tag: runs the full check
# suite, builds dist/EbonBuilds.zip, pulls the release notes from the
# matching "### <version>" section of CHANGELOG.md (same convention
# scripts/release.sh enforces), and uploads the zip as a release asset.
# Replaces the local publish step that used a personal token
# (scripts/publish-github-release.sh remains as a manual fallback).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install toolchain
        run: sh scripts/dev-setup.sh

      - name: Full check suite
        env:
          EBB_FULL: "1"
          EBB_ANNOTATE: "1"
          EBB_LOG_DIR: .cache/check-logs
        run: sh scripts/check.sh --full --verbose

      - name: Upload check logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-check-logs-${{ github.run_id }}
          path: |
            .cache/check-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Build dist zip and run package smoke check
        run: sh scripts/build-dist.sh

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="^### $VERSION " '
              $0 ~ ver { found=1; print; next }
              found && /^### / { exit }
              found { print }
          ' CHANGELOG.md > /tmp/notes_raw.md
          if [ ! -s /tmp/notes_raw.md ]; then
              echo "::error::No '### $VERSION' section found in CHANGELOG.md -- add a changelog entry before tagging." >&2
              exit 1
          fi
          echo "EbonBuilds $VERSION" > /tmp/title.txt
          {
              echo "**Install:** [Download EbonBuilds.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/EbonBuilds.zip)"
              echo "Extract it and drop the \`EbonBuilds\` folder into \`Interface/AddOns/\`."
              if [ -f dist/Auctionator.zip ]; then
                  echo "Optional affix shopping: [Download Auctionator.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Auctionator.zip) — extract to \`Interface/AddOns/Auctionator\` (EbonBuilds enables bridge features when present)."
              fi
              if [ -f dist/Details_TinyThreat.zip ]; then
                  echo "Optional Details! threat plugin: [Download Details_TinyThreat.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Details_TinyThreat.zip) — requires [Details!](https://github.com/Tercioo/Details-Damage-Meter) core in \`Interface/AddOns/Details\` (not shipped with EbonBuilds)."
              fi
              echo
              cat /tmp/notes_raw.md
          } > /tmp/body.md

      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS="dist/EbonBuilds.zip"
          if [ -f dist/Auctionator.zip ]; then
              ASSETS="$ASSETS dist/Auctionator.zip"
          fi
          if [ -f dist/Details_TinyThreat.zip ]; then
              ASSETS="$ASSETS dist/Details_TinyThreat.zip"
          fi
          gh release create "$GITHUB_REF_NAME" $ASSETS \
              --title "$(cat /tmp/title.txt)" \
              --notes-file /tmp/body.md
