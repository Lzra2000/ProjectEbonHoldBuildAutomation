name: Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        See [SUPPORT.md](https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/blob/main/SUPPORT.md) and [troubleshooting](https://lzra2000.github.io/ProjectEbonHoldBuildAutomation/troubleshooting/) for common fixes before filing.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: error-log
    attributes:
      label: Error log output
      description: >
        Settings (gear icon) → Windows & tools → Error log.
        If a click did nothing, attach the Click Trace log too.
        Paste raw text — it is the fastest way to get a fix.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EbonBuilds version
      description: Main window title or `## Version` in EbonBuilds.toc.
      placeholder: "3.84"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Other addons, reproducibility, screenshots, Logbook export for automation bugs.
