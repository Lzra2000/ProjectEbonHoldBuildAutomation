name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Check the [FAQ](https://lzra2000.github.io/ProjectEbonHoldBuildAutomation/faq/) first — many behaviors are intentional. Questions belong in [Discussions](https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/discussions), not here.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: The situation where the addon currently falls short.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen instead? Concrete beats abstract.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, or other ways this could work.
