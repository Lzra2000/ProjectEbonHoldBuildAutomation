site_name: EbonBuilds
site_description: Documentation for EbonBuilds — WoW 3.3.5a echo pick automation for ProjectEbonhold
site_url: https://lzra2000.github.io/ProjectEbonHoldBuildAutomation/
repo_url: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation
repo_name: Lzra2000/ProjectEbonHoldBuildAutomation
edit_uri: edit/main/docs/
# Translated READMEs live under docs/readme/ for GitHub browsing only —
# they are repo documents, not site pages.
exclude_docs: |
  readme/
copyright: EbonBuilds — a community project for ProjectEbonhold. Not affiliated with the server owner.

theme:
  name: material
  logo: img/logo.svg
  favicon: assets/favicon.png
  custom_dir: docs/overrides
  font:
    text: Source Sans 3
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - toc.follow
    - content.action.edit
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation
      name: Repository
    - icon: material/download
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/releases/latest
      name: Latest release
    - icon: material/tag
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/releases
      name: All releases
    - icon: material/forum
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/discussions
      name: Discussions

plugins:
  - search
  # Social cards need cairo/pillow and Google-Fonts access -- available on
  # the CI runner, not necessarily locally. docs.yml sets MKDOCS_SOCIAL=true;
  # local builds skip card generation and stay dependency-light.
  - social:
      enabled: !ENV [MKDOCS_SOCIAL, false]

nav:
  - Home: index.md
  - Guide:
    - guide/index.md
    - Getting Started: getting-started.md
    - Settings: settings.md
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md
    - "Details!: Tiny Threat (PE)": details-tinythreat-pe.md
  - Project:
    - Releases: releases.md
    - "3.86 release prep": release-386-prep.md
    - Changelog: changelog.md
    - Localization: localization.md
  - Contributors:
    - Development: development.md
    - Local checks & CI: dev-testing.md
    - Automation server redesign:
      - automation-server-redesign.md
      - WP1 Board state: board-state-wp1.md
      - WP3 Intent queue: intent-queue-wp3.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
