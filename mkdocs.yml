site_name: EbonBuilds
site_description: WoW 3.3.5a addon for ProjectEbonhold -- echo pick automation
site_url: https://lzra2000.github.io/ProjectEbonHoldBuildAutomation/
repo_url: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation
repo_name: Lzra2000/ProjectEbonHoldBuildAutomation
edit_uri: edit/main/docs/
# Translated READMEs live under docs/readme/ for GitHub browsing only --
# they are repo documents, not site pages.
exclude_docs: |
  readme/
copyright: EbonBuilds — a community project for ProjectEbonhold. Not affiliated with the server owner.

theme:
  name: material
  logo: img/logo.svg
  favicon: img/logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
    - content.action.edit
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation
      name: Repository
    - icon: material/download
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/releases/latest
      name: Latest release
    - icon: material/forum
      link: https://github.com/Lzra2000/ProjectEbonHoldBuildAutomation/discussions
      name: Discussions

plugins:
  - search
  # Social cards need cairo/pillow and Google-Fonts access -- available on
  # the CI runner, not necessarily locally. docs.yml sets MKDOCS_SOCIAL=true;
  # local builds skip card generation and stay dependency-light.
  - social:
      enabled: !ENV [MKDOCS_SOCIAL, false]

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Settings: settings.md
  - FAQ: faq.md
  - Localization: localization.md
  - Development: development.md
  - Automation server redesign: automation-server-redesign.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
